<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manejando Eventos</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <!-- Bootstrap JS -->
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <script defer src="assets/js/script.js"></script>
</head>

<body>
  <main class="container">
    <h1>Manejando Eventos</h1>

    <section class="row mt-5">

      <div class="col-md-6">
        <h3>Agregar tarea:</h3>

        <form id="formTarea">
          <div class="mb-3">
            <label for="tarea" class="form-label">Nueva tarea</label>
            <input type="text" name="tarea" id="tarea" class="form-control">
          </div>
          <button type="button" id="botonAgregar" class="btn btn-primary">Agregar tarea</button>
        </form>
      </div>

      <div class="col-md-6">
        <h3>Lista de tareas:</h3>
        <ul class="list-group" id="listaTareas">
          <!-- Aquí se insertarán los elementos <li> de forma dinámica desde JS -->
        </ul>
      </div>
    </section>
  </main>

</body>

</html>
